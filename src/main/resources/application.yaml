spring:
  application:
    name: urlshortner


  datasource:
    url: jdbc:postgresql://localhost:5432/shortner
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
app:
  base-url: http://localhost:8080
  api-key: my-secret-key